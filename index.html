<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio | Smart Store Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/index.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page-shell">
    <div class="status-bar" id="status" hidden></div>

    <header class="header">
      <div class="header-inner">
        <img class="header-logo" id="brandLogo" src="assets/Aldo%20Lanches%20logo.jpg" alt="Logo do restaurante">
        <div class="header-info">
          <h1 class="header-name" id="brandName">Restaurante</h1>
          <p class="header-hours" id="brandSchedule">Horário não informado</p>
          <div class="quick-info">
            <a class="quick-pill quick-action" id="brandPhoneLink" href="#" target="_blank" rel="noopener" aria-label="Abrir conversa no WhatsApp">
              WhatsApp: <strong id="brandPhone">-</strong>
            </a>
            <a class="quick-pill quick-action" id="brandPixLink" href="#" target="_blank" rel="noopener" aria-label="Abrir link de pagamento PIX">
              <strong id="brandPix">Pagar com PIX</strong>
            </a>
          </div>
        </div>
      </div>
    </header>

    <section class="tools">
      <div id="storeInfo" class="store-info" hidden>
        <div class="store-info-text" id="storeInfoText"></div>
      </div>
      <input id="searchInput" class="search-box" type="search" placeholder="Buscar por nome ou descrição" aria-label="Buscar item no cardápio">
      <nav class="cat-nav" id="catNav" aria-label="Categorias"></nav>
    </section>

    <main class="main" id="menu"></main>
  </div>

  <div class="modal-backdrop" id="itemModal">
    <div id="modalBody"></div>
  </div>

  <div class="cart-backdrop" id="cartBackdrop">
    <aside class="cart-panel" role="dialog" aria-modal="true" aria-label="Carrinho">
      <header class="cart-head">
        <h3>Seu carrinho</h3>
        <button type="button" id="closeCartBtn" class="ghost-btn">Fechar</button>
      </header>
      <div class="cart-list" id="cartList"></div>
      <footer class="cart-foot">
        <div class="cart-total-row">
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <textarea id="cartNote" class="cart-note" placeholder="Especificações do pedido e da entrega (opcional)"></textarea>
        <button type="button" class="ghost-btn remove-unavailable-btn" id="removeUnavailableBtn" hidden>Remover indisponíveis</button>
        <button type="button" class="checkout-btn" id="checkoutBtn">Finalizar no WhatsApp</button>
      </footer>
    </aside>
  </div>

  <button type="button" class="cart-fab" id="cartFab" aria-label="Abrir carrinho">
    <span id="cartFabCount">0 itens</span>
    <strong id="cartFabTotal">R$ 0,00</strong>
  </button>

  <footer class="creditos-dev" style="text-align:center; margin: 2em 0 1em 0; font-size: 0.95em; color: #526947;">
    Desenvolvido por <strong>Gabriel J Santos</strong>
    &nbsp;|&nbsp;
    <a href="https://github.com/gabrieljsantos" target="_blank" rel="noopener" style="color: #526947; text-decoration: underline;">GitHub</a>
    &nbsp;|&nbsp;
    <a href="https://www.linkedin.com/in/gabriel-j-santos/" target="_blank" rel="noopener" style="color: #526947; text-decoration: underline;">LinkedIn</a>
    &nbsp;|&nbsp;
    <a href="https://www.instagram.com/gabriel_j.santos_?igsh=azZ1b2E0b3VqdTBu" target="_blank" rel="noopener" style="color: #526947; text-decoration: underline;">Instagram</a>
  </footer>

  <script src="assets/js/index.js"></script>
</body>
</html>
